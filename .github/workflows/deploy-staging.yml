# Staging deploy on every push to the `staging` branch.
# Requires GitHub secrets: STAGING_SUPABASE_URL, STAGING_SUPABASE_PUBLISHABLE_KEY,
# STAGING_SUPABASE_PROJECT_ID (plus the existing CLOUDFLARE_* secrets).

name: Deploy Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate secrets
        run: |
          missing=0
          for key in STAGING_SUPABASE_URL STAGING_SUPABASE_PUBLISHABLE_KEY STAGING_SUPABASE_PROJECT_ID CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing GitHub Actions secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Add secrets under GitHub → Settings → Secrets and variables → Actions"
            exit 1
          fi
        env:
          STAGING_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          STAGING_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.STAGING_SUPABASE_PUBLISHABLE_KEY }}
          STAGING_SUPABASE_PROJECT_ID: ${{ secrets.STAGING_SUPABASE_PROJECT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build
        run: bun run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.STAGING_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.STAGING_SUPABASE_PROJECT_ID }}
          SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.STAGING_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_PROJECT_ID: ${{ secrets.STAGING_SUPABASE_PROJECT_ID }}

      - name: Verify bundle contains Supabase config
        run: |
          bundle=$(ls .output/public/assets/index-*.js | head -1)
          if grep -q "Missing Supabase" "$bundle"; then
            echo "::error::Build output is missing VITE_SUPABASE_* — check GitHub Actions secrets"
            exit 1
          fi
          if ! grep -q "${STAGING_SUPABASE_PROJECT_ID}" "$bundle"; then
            echo "::error::Staging project ID not found in client bundle"
            exit 1
          fi
        env:
          STAGING_SUPABASE_PROJECT_ID: ${{ secrets.STAGING_SUPABASE_PROJECT_ID }}

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            deploy
            --name adumke-star-gt-slider-studio-staging
            --keep-vars
            --var SUPABASE_URL:${{ secrets.STAGING_SUPABASE_URL }}
            --var SUPABASE_PUBLISHABLE_KEY:${{ secrets.STAGING_SUPABASE_PUBLISHABLE_KEY }}
            --var SUPABASE_PROJECT_ID:${{ secrets.STAGING_SUPABASE_PROJECT_ID }}
